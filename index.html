<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SKooL-Wordle</title>
<style>
:root {
  --cell-size: clamp(30px, 5.5vw, 44px);
  --cell-font: clamp(13px, 3vw, 18px);
  --kb-key-h: clamp(30px, 5vw, 38px);
  --kb-key-font: clamp(9px, 1.8vw, 13px);
  --kb-gap: clamp(2px, 0.4vw, 4px);
  --col-gap: clamp(4px, 1vw, 8px);
  --header-logo: clamp(36px, 6vw, 60px);
  --header-title: clamp(14px, 3.5vw, 24px);
  --team-name-font: clamp(11px, 2vw, 15px);
  --team-score-font: clamp(13px, 2.5vw, 18px);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { font-family: "Segoe UI", Arial, sans-serif; background: #f0f4ff; min-height: 100vh; }
#app { width: 100%; max-width: 1400px; margin: 0 auto; padding: 6px; }

/* ── HEADER ── */
.header {
  display: flex; align-items: center; justify-content: center;
  gap: clamp(8px,2vw,16px); padding: 6px 12px;
  background: #1a1a2e; border-radius: 12px; margin-bottom: 8px;
}
.logo-img { height: var(--header-logo); object-fit: contain; border-radius: 4px; }
.game-title { color: #ffd93d; font-size: var(--header-title); font-weight: 900; letter-spacing: 2px; text-shadow: 0 2px 6px rgba(0,0,0,.4); white-space: nowrap; }

/* ── SETUP ── */
.setup-panel { background:#fff; border-radius:16px; padding: clamp(14px,3vw,28px); max-width:640px; margin:0 auto; box-shadow:0 4px 20px rgba(0,0,0,.1); }
.setup-panel h2 { text-align:center; color:#1a1a2e; font-size: clamp(15px,3vw,20px); margin-bottom:18px; }
.setup-row { margin-bottom:12px; }
.setup-row label { display:block; font-weight:700; color:#333; margin-bottom:5px; font-size: clamp(12px,2vw,14px); }
.setup-row select, .setup-row input[type=number] { width:100%; padding: 9px 11px; border:2px solid #ddd; border-radius:8px; font-size: clamp(12px,2vw,14px); }
.setup-row select:focus, .setup-row input:focus { border-color:#6c63ff; outline:none; }
.two-col { display:flex; gap:10px; }
.two-col .setup-row { flex:1; }
.team-names-row { display:flex; gap:8px; flex-wrap:wrap; }
.team-name-input { flex:1; min-width:80px; padding:8px 10px; border:2px solid #ddd; border-radius:8px; font-size: clamp(12px,2vw,13px); }
.word-bank-area { display:flex; gap:8px; margin-bottom:8px; }
.word-bank-area input { flex:1; padding:8px 10px; border:2px solid #ddd; border-radius:8px; font-size: clamp(12px,2vw,14px); }
.word-bank-area button { padding:8px 14px; background:#6c63ff; color:#fff; border:none; border-radius:8px; cursor:pointer; font-weight:700; font-size: clamp(12px,2vw,13px); }
.word-chips { display:flex; flex-wrap:wrap; gap:6px; min-height:32px; border:1px dashed #ccc; border-radius:8px; padding:6px; }
.word-chip { background:#6c63ff; color:#fff; padding:3px 10px; border-radius:20px; font-size:12px; display:flex; align-items:center; gap:5px; }
.word-chip .rm { cursor:pointer; font-weight:900; opacity:.8; }
.bank-hint { font-size:11px; color:#888; margin-top:4px; font-style:italic; }
.start-btn { width:100%; padding: clamp(10px,2.5vw,14px); background:linear-gradient(135deg,#ff6b6b,#ffd93d); color:#fff; border:none; border-radius:10px; font-size: clamp(14px,3vw,18px); font-weight:800; cursor:pointer; margin-top:14px; letter-spacing:1px; }
.start-btn:hover { opacity:.92; }

/* ── GAME CONTROLS ── */
.game-area { display:none; }
.controls-bar { display:flex; gap:8px; justify-content:center; margin-bottom:5px; flex-wrap:wrap; align-items:center; }
.ctrl-btn { padding: 5px 12px; border:2px solid #6c63ff; color:#6c63ff; background:#fff; border-radius:20px; font-size: clamp(11px,1.8vw,13px); font-weight:700; cursor:pointer; }
.ctrl-btn:hover { background:#6c63ff; color:#fff; }
.round-badge { background:#ffd93d; color:#333; font-size: clamp(11px,1.8vw,13px); font-weight:800; padding:4px 14px; border-radius:20px; }

/* ── TIMER ── */
.timer-bar { text-align:center; margin-bottom:5px; }
.timer-display { display:inline-block; background:#1a1a2e; color:#fff; font-size: clamp(20px,4vw,30px); font-weight:900; padding:5px 22px; border-radius:12px; letter-spacing:4px; font-family:monospace; }
.timer-display.warning { background:#ff6b6b; animation:pulse 1s infinite; }
.timer-display.done { background:#9e9e9e; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.7} }

/* ── SCORING LEGEND ── */
.scoring-legend { display:flex; gap:8px; justify-content:center; margin-bottom:5px; flex-wrap:wrap; }
.legend-item { font-size: clamp(10px,1.6vw,12px); font-weight:700; padding:3px 10px; border-radius:20px; }
.leg-correct { background:#4caf50; color:#fff; }
.leg-present { background:#ff9800; color:#fff; }

/* ── TEAM COLUMNS ── */
.teams-container { display:flex; gap:var(--col-gap); width:100%; align-items:flex-start; }
.team-col { flex:1; background:#fff; border-radius:12px; padding: clamp(5px,1.2vw,8px) clamp(4px,1vw,6px); box-shadow:0 3px 12px rgba(0,0,0,.12); min-width:0; overflow:hidden; }

.team-header { text-align:center; padding: clamp(5px,1vw,8px) 4px; border-radius:10px; margin-bottom:6px; }
.team-header .team-name { font-size:var(--team-name-font); font-weight:800; color:#fff; text-shadow:0 1px 3px rgba(0,0,0,.3); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.team-header .team-score { font-size:var(--team-score-font); color:#fff; font-weight:900; margin-top:1px; }
.team-header .word-info { font-size: clamp(9px,1.4vw,11px); color:rgba(255,255,255,.85); margin-top:2px; }

/* ── GRID ── */
.grid { display:flex; flex-direction:column; gap: clamp(2px,0.4vw,4px); margin-bottom:5px; align-items:center; }
.grid-row { display:flex; gap: clamp(2px,0.4vw,4px); }
.cell { width:var(--cell-size); height:var(--cell-size); border:2px solid #ccc; border-radius:5px; display:flex; align-items:center; justify-content:center; font-size:var(--cell-font); font-weight:900; text-transform:uppercase; color:#333; background:#fff; transition:all .15s; }
.cell.correct { background:#4caf50; border-color:#388e3c; color:#fff; }
.cell.present { background:#ff9800; border-color:#f57c00; color:#fff; }
.cell.absent  { background:#bdbdbd; border-color:#9e9e9e; color:#fff; }
.cell.active-row { border-color:#6c63ff; background:#f8f7ff; }
.cell.filled  { border-color:#999; }

/* score pop */
.score-pop { position:fixed; font-size:20px; font-weight:900; pointer-events:none; z-index:9999; animation:floatUp 1s ease-out forwards; color:#4caf50; }
@keyframes floatUp { 0%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-55px)} }

/* ── KEYBOARD ── */
.keyboard { display:flex; flex-direction:column; gap:var(--kb-gap); align-items:center; width:100%; }
.kb-row { display:flex; gap:var(--kb-gap); justify-content:center; width:100%; }
.kb-key { height:var(--kb-key-h); border-radius:5px; border:none; cursor:pointer; font-size:var(--kb-key-font); font-weight:700; background:#e0e0e0; color:#222; display:flex; align-items:center; justify-content:center; padding:0 2px; transition:all .12s; user-select:none; flex:1; min-width:0; max-width: clamp(26px,4vw,38px); }
.kb-key:hover { background:#c8c8c8; }
.kb-key:active { transform:scale(.93); }
.kb-key.wide { max-width: clamp(38px,6vw,54px); font-size: clamp(8px,1.3vw,11px); }
.kb-key.correct { background:#4caf50; color:#fff; }
.kb-key.present { background:#ff9800; color:#fff; }
.kb-key.absent  { background:#bdbdbd; color:#fff; }

/* status */
.status-msg { text-align:center; font-size: clamp(10px,1.6vw,12px); font-weight:700; min-height:18px; margin-bottom:3px; border-radius:6px; padding:2px 4px; }
.correct-msg { color:#2e7d32; background:#e8f5e9; }
.error-msg   { color:#c62828; background:#ffebee; }
.info-msg    { color:#1565c0; background:#e3f2fd; }

.next-word-btn { width:100%; padding: clamp(5px,1vw,7px); background:#6c63ff; color:#fff; border:none; border-radius:8px; font-size: clamp(11px,1.8vw,13px); font-weight:700; cursor:pointer; margin-bottom:5px; }
.next-word-btn:hover { background:#5a52e0; }

/* ── TOAST ── */
.toast { position:fixed; top:70px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:9px 20px; border-radius:24px; font-weight:700; font-size: clamp(12px,2vw,14px); z-index:9998; opacity:0; transition:opacity .3s; pointer-events:none; white-space:nowrap; }
.toast.show { opacity:1; }

/* ── TEAM COLOURS ── */
.tc0 { background:linear-gradient(135deg,#ff6b6b,#ee5a24); }
.tc1 { background:linear-gradient(135deg,#a29bfe,#6c63ff); }
.tc2 { background:linear-gradient(135deg,#00b894,#00cec9); }

/* ── TIME-UP OVERLAY ── */
.time-up-overlay { position:fixed; inset:0; background:rgba(0,0,0,.78); z-index:9000; display:flex; align-items:center; justify-content:center; padding:12px; }
.time-up-box { background:#fff; border-radius:20px; padding: clamp(18px,4vw,36px) clamp(20px,5vw,48px); text-align:center; max-width:500px; width:100%; max-height:90vh; overflow-y:auto; }
.time-up-box h2 { font-size: clamp(18px,4vw,26px); color:#1a1a2e; margin-bottom:10px; }
.time-up-box .subtitle { font-size: clamp(12px,2vw,14px); color:#555; margin-bottom:10px; }
.final-scores { margin:10px 0; }
.score-row { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #eee; font-size: clamp(13px,2.5vw,16px); }
.score-row:last-child { border-bottom:none; font-weight:800; font-size: clamp(15px,3vw,18px); }
.winner-label { font-size: clamp(16px,3.5vw,22px); font-weight:900; color:#ff6b6b; margin-top:10px; }

/* Unrevealed words section */
.unrevealed-section { margin-top:14px; padding-top:12px; border-top:2px dashed #eee; }
.unrevealed-section h3 { font-size: clamp(12px,2.2vw,15px); color:#555; margin-bottom:8px; font-weight:700; }
.unrevealed-list { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; }
.unrevealed-item { background:#f5f5f5; border-radius:10px; padding:8px 14px; font-size: clamp(11px,2vw,14px); text-align:center; min-width:80px; }
.unrevealed-item .team-label { font-size: clamp(9px,1.5vw,11px); color:#888; font-weight:600; display:block; margin-bottom:3px; }
.unrevealed-item .the-word { font-size: clamp(14px,2.5vw,18px); font-weight:900; color:#1a1a2e; letter-spacing:2px; text-transform:uppercase; }
.unrevealed-item.won { background:#e8f5e9; }
.unrevealed-item.won .the-word { color:#2e7d32; }

.time-up-btns { display:flex; gap:10px; justify-content:center; margin-top:16px; flex-wrap:wrap; }
.time-up-btns button { padding: clamp(8px,2vw,11px) clamp(16px,3vw,24px); border:none; border-radius:10px; font-size: clamp(13px,2.5vw,15px); font-weight:700; cursor:pointer; }
.btn-again { background:#6c63ff; color:#fff; }
.btn-setup { background:#eee; color:#333; }

/* ── RESPONSIVE SINGLE COLUMN on very small screens ── */
@media (max-width: 420px) {
  .teams-container { flex-direction:column; }
  .team-col { width:100%; }
  :root { --cell-size: clamp(36px,8vw,44px); --kb-key-h: 36px; --kb-key-font: 11px; }
  .kb-key { max-width:none; }
  .kb-key.wide { max-width:none; flex:1.6; }
}
</style>
</head>

  <!-- SETUP -->
  <div id="setup-panel" class="setup-panel">
    <h2>⚙️ Game Setup</h2>
    <div class="two-col">
      <div class="setup-row">
        <label>Number of Teams</label>
        <select id="num-teams">
          <option value="1">1 Team</option>
          <option value="2" selected>2 Teams</option>
          <option value="3">3 Teams</option>
        </select>
      </div>
      <div class="setup-row">
        <label>Student Level (CEFR)</label>
        <select id="student-level">
          <option value="A1">A1 – Beginner</option>
          <option value="A2">A2 – Elementary</option>
          <option value="B1" selected>B1 – Intermediate</option>
          <option value="B2">B2 – Upper Intermediate</option>
          <option value="C1">C1/C2 – Advanced</option>
        </select>
      </div>
    </div>
    <div class="two-col">
      <div class="setup-row">
        <label>Word Length (letters)</label>
        <select id="word-length">
          <option value="any">Any length</option>
          <option value="3">3 letters</option>
          <option value="4">4 letters</option>
          <option value="5" selected>5 letters</option>
          <option value="6">6 letters</option>
          <option value="7">7 letters</option>
          <option value="8">8 letters</option>
        </select>
      </div>
      <div class="setup-row">
        <label>Round Timer (minutes, 0 = off)</label>
        <input type="number" id="timer-mins" min="0" max="60" value="0">
      </div>
    </div>
    <div class="setup-row">
      <label>Team Names</label>
      <div class="team-names-row" id="team-names-row">
        <input class="team-name-input" placeholder="Team 1" value="Team 1">
        <input class="team-name-input" placeholder="Team 2" value="Team 2">
        <input class="team-name-input" placeholder="Team 3" value="Team 3" style="display:none">
      </div>
    </div>
    <div class="setup-row">
      <label>Add Your Own Words (optional, 3–8 letters)</label>
      <div class="word-bank-area">
        <input type="text" id="word-input" placeholder="Type a word and press Add..." maxlength="8">
        <button onclick="addWord()">Add</button>
      </div>
      <div class="word-chips" id="word-chips"></div>
      <div class="bank-hint">Leave empty — words chosen automatically from the CEFR level above.</div>
    </div>
    <button class="start-btn" onclick="startGame()">▶ Start Game!</button>
  </div>

  <!-- GAME -->
  <div id="game-area" class="game-area">
    <div class="controls-bar">
      <button class="ctrl-btn" onclick="showSetup()">⚙️ New Game</button>
      <button class="ctrl-btn" onclick="newRound()">🔄 New Round</button>
      <span class="round-badge" id="round-badge">Round 1</span>
    </div>
    <div class="scoring-legend">
      <span class="legend-item leg-correct">🟩 Correct place = +10 pts</span>
      <span class="legend-item leg-present">🟧 In word = +5 pts</span>
    </div>
    <div class="timer-bar" id="timer-bar" style="display:none">
      <div class="timer-display" id="timer-display">05:00</div>
    </div>
    <div class="teams-container" id="teams-container"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div id="time-up-overlay" style="display:none" class="time-up-overlay"></div>

let wordBank=[],gameState=[],numTeams=2;
let teamNames=["Team 1","Team 2","Team 3"];
let scores=[0,0,0],currentWords=[],roundNumber=1;
let currentLevel="B1",chosenLength=5;
let timerMins=0,timerInterval=null,timerSecsLeft=0;

const KB_ROWS=[["Q","W","E","R","T","Y","U","I","O","P"],["A","S","D","F","G","H","J","K","L"],["ENTER","Z","X","C","V","B","N","M","⌫"]];

document.getElementById("num-teams").addEventListener("change",function(){
  const n=parseInt(this.value);
  document.querySelectorAll(".team-name-input").forEach((inp,i)=>inp.style.display=i<n?"":"none");
});
document.getElementById("word-input").addEventListener("keydown",e=>{if(e.key==="Enter")addWord();});

function addWord(){
  const inp=document.getElementById("word-input");
  const word=inp.value.trim().toLowerCase().replace(/[^a-z]/g,"");
  if(word.length<3||word.length>8){showToast("Words must be 3–8 letters!");return;}
  if(wordBank.includes(word)){showToast("Already added!");return;}
  wordBank.push(word);renderChips();inp.value="";inp.focus();
}
function removeWord(w){wordBank=wordBank.filter(x=>x!==w);renderChips();}
function renderChips(){
  document.getElementById("word-chips").innerHTML=wordBank.map(w=>
    `<span class="word-chip">${w} <span class="rm" onclick="removeWord('${w}')">×</span></span>`).join("");
}

/* Pick words by exact length from CEFR bank */
function getPool(len){
  const levelData=CEFR_WORDS[currentLevel]||CEFR_WORDS["B1"];
  let combined;
  if(wordBank.length>0){
    const filtered=wordBank.filter(w=>len==="any"||w.length===parseInt(len));
    if(filtered.length>0) return filtered;
  }
  if(len==="any"){
    combined=Object.values(levelData).flat();
  } else {
    const l=parseInt(len);
    combined=levelData[l]||[];
    /* If exact length missing, find closest available */
    if(combined.length===0){
      const available=Object.keys(levelData).map(Number).sort((a,b)=>Math.abs(a-l)-Math.abs(b-l));
      combined=levelData[available[0]]||Object.values(levelData).flat();
    }
  }
  return [...new Set(combined)];
}

function pickWord(used,len){
  const pool=getPool(len);
  const avail=pool.filter(w=>!used.includes(w));
  const src=avail.length>0?avail:pool;
  return src[Math.floor(Math.random()*src.length)];
}

function createTeamState(word){
  return{word,guesses:[],currentGuess:"",done:false,won:false,wordScore:0,keyColors:{},statusMsg:"",statusCls:""};
}

function startGame(){
  numTeams=parseInt(document.getElementById("num-teams").value);
  const nameInputs=document.querySelectorAll(".team-name-input");
  teamNames=Array.from(nameInputs).map((inp,i)=>i<numTeams?(inp.value.trim()||`Team ${i+1}`):`Team ${i+1}`);
  currentLevel=document.getElementById("student-level").value;
  const lenVal=document.getElementById("word-length").value;
  chosenLength=lenVal==="any"?"any":parseInt(lenVal);
  timerMins=Math.max(0,parseInt(document.getElementById("timer-mins").value)||0);
  scores=Array(numTeams).fill(0);
  roundNumber=1;currentWords=[];gameState=[];
  for(let t=0;t<numTeams;t++){
    const word=pickWord(currentWords,chosenLength);
    currentWords.push(word);gameState.push(createTeamState(word));
  }
  document.getElementById("setup-panel").style.display="none";
  document.getElementById("game-area").style.display="block";
  document.getElementById("round-badge").textContent=`Round ${roundNumber}`;
  startTimer();renderGame();
}

function startTimer(){
  clearInterval(timerInterval);
  const bar=document.getElementById("timer-bar");
  if(timerMins<=0){bar.style.display="none";return;}
  bar.style.display="block";
  timerSecsLeft=timerMins*60;
  updateTimerDisplay();
  timerInterval=setInterval(()=>{
    timerSecsLeft--;updateTimerDisplay();
    if(timerSecsLeft<=0){clearInterval(timerInterval);showTimeUp();}
  },1000);
}

function updateTimerDisplay(){
  const el=document.getElementById("timer-display");
  const m=Math.floor(timerSecsLeft/60),s=timerSecsLeft%60;
  el.textContent=`${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
  el.className="timer-display"+(timerSecsLeft<=30&&timerSecsLeft>0?" warning":timerSecsLeft<=0?" done":"");
  if(timerSecsLeft>0&&timerSecsLeft<=30)playSound("tick");
}

/* TIME UP — reveals any unsolved words */
function showTimeUp(){
  clearInterval(timerInterval);
  const overlay=document.getElementById("time-up-overlay");
  const sorted=teamNames.slice(0,numTeams).map((name,i)=>({name,score:scores[i]})).sort((a,b)=>b.score-a.score);
  const winner=sorted[0];
  const rowsHTML=sorted.map((t,i)=>`<div class="score-row"><span>${i===0?"🏆 ":""}${t.name}</span><span>${t.score} pts</span></div>`).join("");

  /* Build "unrevealed words" section */
  let unrevHTML="";
  const unresolved=gameState.map((s,i)=>({s,i})).filter(({s})=>!s.won);
  if(unresolved.length>0){
    const items=unresolved.map(({s,i})=>`
      <div class="unrevealed-item">
        <span class="team-label">${teamNames[i]}</span>
        <span class="the-word">${s.word}</span>
      </div>`).join("");
    unrevHTML=`<div class="unrevealed-section">
      <h3>🔍 The words that weren't found:</h3>
      <div class="unrevealed-list">${items}</div>
    </div>`;
  }

  overlay.innerHTML=`<div class="time-up-box">
    <h2>⏰ Time's Up!</h2>
    <p class="subtitle">Final scores for this round</p>
    <div class="final-scores">${rowsHTML}</div>
    <div class="winner-label">${winner.name} wins! 🎉</div>
    ${unrevHTML}
    <div class="time-up-btns">
      <button class="btn-again" onclick="playAgain()">Play Again</button>
      <button class="btn-setup" onclick="showSetup()">New Game</button>
    </div>
  </div>`;
  overlay.style.display="flex";
  playSound("win");
}

function playAgain(){
  document.getElementById("time-up-overlay").style.display="none";
  scores=Array(numTeams).fill(0);roundNumber=1;currentWords=[];gameState=[];
  for(let t=0;t<numTeams;t++){
    const word=pickWord(currentWords,chosenLength);
    currentWords.push(word);gameState.push(createTeamState(word));
  }
  document.getElementById("round-badge").textContent=`Round ${roundNumber}`;
  startTimer();renderGame();
}

function newRound(){
  clearInterval(timerInterval);
  roundNumber++;currentWords=[];
  for(let t=0;t<numTeams;t++){
    const word=pickWord(currentWords,chosenLength);
    currentWords.push(word);gameState[t]=createTeamState(word);
  }
  document.getElementById("round-badge").textContent=`Round ${roundNumber}`;
  startTimer();renderGame();
}

function showSetup(){
  clearInterval(timerInterval);
  document.getElementById("time-up-overlay").style.display="none";
  document.getElementById("setup-panel").style.display="block";
  document.getElementById("game-area").style.display="none";
  wordBank=[];renderChips();
}

function renderGame(){
  const container=document.getElementById("teams-container");
  container.innerHTML="";
  for(let t=0;t<numTeams;t++){
    const col=document.createElement("div");
    col.className="team-col";col.id=`team-col-${t}`;
    col.innerHTML=buildTeamHTML(t);container.appendChild(col);
  }
}

function buildTeamHTML(t){
  const state=gameState[t],wl=state.word.length,maxG=6;
  let gridHTML='<div class="grid">';
  for(let r=0;r<maxG;r++){
    gridHTML+='<div class="grid-row">';
    for(let c=0;c<wl;c++){
      let letter="",cls="";
      if(r<state.guesses.length){letter=state.guesses[r].letters[c];cls=state.guesses[r].colors[c];}
      else if(r===state.guesses.length&&!state.done){
        if(c<state.currentGuess.length){letter=state.currentGuess[c];cls="active-row filled";}
        else cls="active-row";
      }
      gridHTML+=`<div class="cell ${cls}">${letter}</div>`;
    }
    gridHTML+='</div>';
  }
  gridHTML+='</div>';

  let kbHTML='<div class="keyboard">';
  KB_ROWS.forEach(row=>{
    kbHTML+='<div class="kb-row">';
    row.forEach(key=>{
      const wide=key==="ENTER"||key==="⌫";
      const kc=state.keyColors[key]||"";
      kbHTML+=`<div class="kb-key ${wide?"wide":""} ${kc}" onclick="handleKey(${t},'${key}')">${key}</div>`;
    });
    kbHTML+='</div>';
  });
  kbHTML+='</div>';

  const colorClass=["tc0","tc1","tc2"][t%3];
  const triesLeft=maxG-state.guesses.length;
  let statusText="",statusCls="";
  if(state.done){
    if(state.won){statusText=`✅ ${state.word.toUpperCase()} — +${state.wordScore} pts`;statusCls="correct-msg";}
    else{statusText=`❌ Word: ${state.word.toUpperCase()}`;statusCls="error-msg";}
  }else if(state.statusMsg){statusText=state.statusMsg;statusCls=state.statusCls||"info-msg";}
  else{statusText=`${triesLeft} tries left · ${wl} letters`;statusCls="info-msg";}

  return `
    <div class="team-header ${colorClass}">
      <div class="team-name">${teamNames[t]}</div>
      <div class="team-score">${scores[t]} pts</div>
      <div class="word-info">Level ${currentLevel} · ${wl}-letter word</div>
    </div>
    ${state.done?`<button class="next-word-btn" onclick="nextWord(${t})">Next Word ▶</button>`:""}
    ${gridHTML}
    <div class="status-msg ${statusCls}">${statusText}</div>
    ${kbHTML}
  `;
}

function handleKey(t,key){
  const state=gameState[t];
  if(state.done)return;
  if(key==="⌫"){state.currentGuess=state.currentGuess.slice(0,-1);state.statusMsg="";updateTeamDisplay(t);return;}
  if(key==="ENTER"){submitGuess(t);return;}
  if(state.currentGuess.length<state.word.length){
    state.currentGuess+=key.toLowerCase();state.statusMsg="";updateTeamDisplay(t);playSound("type");
  }
}

function submitGuess(t){
  const state=gameState[t];
  const guess=state.currentGuess,wl=state.word.length;
  if(guess.length<wl){
    state.statusMsg=`Need ${wl} letters!`;state.statusCls="error-msg";
    updateTeamDisplay(t);playSound("error");return;
  }
  const result=evaluateGuess(guess,state.word);
  state.guesses.push({letters:guess.split(""),colors:result.colors});
  let guessPoints=0;
  result.colors.forEach(c=>{if(c==="correct")guessPoints+=10;else if(c==="present")guessPoints+=5;});
  state.wordScore=(state.wordScore||0)+guessPoints;
  scores[t]+=guessPoints;
  if(guessPoints>0)showScorePop(t,`+${guessPoints}`);
  result.colors.forEach((c,i)=>{
    const ltr=guess[i].toUpperCase(),prev=state.keyColors[ltr];
    if(c==="correct")state.keyColors[ltr]="correct";
    else if(c==="present"&&prev!=="correct")state.keyColors[ltr]="present";
    else if(c==="absent"&&!prev)state.keyColors[ltr]="absent";
  });
  const hasC=result.colors.some(c=>c==="correct");
  const hasP=result.colors.some(c=>c==="present");
  if(hasC)playSound("correct");else if(hasP)playSound("present");else playSound("absent");
  state.currentGuess="";
  if(guess===state.word){
    state.done=true;state.won=true;
    showToast(`${teamNames[t]} got it! 🎉 +${state.wordScore} pts`);playSound("win");
  }else if(state.guesses.length>=6){
    state.done=true;state.won=false;
    /* Show word immediately when out of guesses */
    state.statusMsg=`❌ Word was: ${state.word.toUpperCase()}`;state.statusCls="error-msg";
    playSound("lose");
  }
  updateTeamDisplay(t);
}

function evaluateGuess(guess,word){
  const colors=Array(word.length).fill("absent");
  const wA=word.split(""),gA=guess.split("");
  const uW=Array(word.length).fill(false),uG=Array(word.length).fill(false);
  for(let i=0;i<word.length;i++)if(gA[i]===wA[i]){colors[i]="correct";uW[i]=uG[i]=true;}
  for(let i=0;i<word.length;i++){
    if(uG[i])continue;
    for(let j=0;j<word.length;j++){
      if(!uW[j]&&gA[i]===wA[j]){colors[i]="present";uW[j]=true;break;}
    }
  }
  return{colors};
}

function showScorePop(t,text){
  const col=document.getElementById(`team-col-${t}`);
  if(!col)return;
  const rect=col.getBoundingClientRect();
  const el=document.createElement("div");
  el.className="score-pop";el.textContent=text;
  el.style.cssText=`left:${rect.left+rect.width/2-24}px;top:${rect.top+60+window.scrollY}px;`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1050);
}

function updateTeamDisplay(t){
  const col=document.getElementById(`team-col-${t}`);
  if(col)col.innerHTML=buildTeamHTML(t);
}

function nextWord(t){
  const used=currentWords.filter((_,i)=>i!==t);
  const word=pickWord(used,chosenLength);
  currentWords[t]=word;
  gameState[t]=createTeamState(word);
  updateTeamDisplay(t);
}

const AudioCtx=window.AudioContext||window.webkitAudioContext;
let audioCtx=null;
function getAC(){if(!audioCtx)audioCtx=new AudioCtx();return audioCtx;}
let lastTick=0;
function playSound(type){
  if(type==="tick"){const now=Date.now();if(now-lastTick<900)return;lastTick=now;}
  try{
    const ctx=getAC(),osc=ctx.createOscillator(),gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);const n=ctx.currentTime;
    if(type==="correct"){osc.frequency.setValueAtTime(523,n);osc.frequency.setValueAtTime(659,n+0.1);gain.gain.setValueAtTime(0.18,n);gain.gain.exponentialRampToValueAtTime(0.001,n+0.3);osc.start(n);osc.stop(n+0.3);}
    else if(type==="present"){osc.frequency.setValueAtTime(440,n);gain.gain.setValueAtTime(0.12,n);gain.gain.exponentialRampToValueAtTime(0.001,n+0.2);osc.start(n);osc.stop(n+0.2);}
    else if(type==="absent"){osc.frequency.setValueAtTime(300,n);osc.type="sawtooth";gain.gain.setValueAtTime(0.06,n);gain.gain.exponentialRampToValueAtTime(0.001,n+0.15);osc.start(n);osc.stop(n+0.15);}
    else if(type==="win"){osc.frequency.setValueAtTime(523,n);osc.frequency.setValueAtTime(659,n+0.1);osc.frequency.setValueAtTime(784,n+0.2);osc.frequency.setValueAtTime(1047,n+0.35);gain.gain.setValueAtTime(0.22,n);gain.gain.exponentialRampToValueAtTime(0.001,n+0.55);osc.start(n);osc.stop(n+0.55);}
    else if(type==="lose"){osc.frequency.setValueAtTime(300,n);osc.frequency.setValueAtTime(200,n+0.2);osc.type="square";gain.gain.setValueAtTime(0.15,n);gain.gain.exponentialRampToValueAtTime(0.001,n+0.4);osc.start(n);osc.stop(n+0.4);}
    else if(type==="error"){osc.frequency.setValueAtTime(180,n);osc.type="square";gain.gain.setValueAtTime(0.08,n);gain.gain.exponentialRampToValueAtTime(0.001,n+0.18);osc.start(n);osc.stop(n+0.18);}
    else if(type==="type"){osc.frequency.setValueAtTime(900,n);gain.gain.setValueAtTime(0.04,n);gain.gain.exponentialRampToValueAtTime(0.001,n+0.04);osc.start(n);osc.stop(n+0.04);}
    else if(type==="tick"){osc.frequency.setValueAtTime(1200,n);gain.gain.setValueAtTime(0.06,n);gain.gain.exponentialRampToValueAtTime(0.001,n+0.06);osc.start(n);osc.stop(n+0.06);}
  }catch(e){}
}

function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2800);}

document.addEventListener("keydown",e=>{
  const ga=document.getElementById("game-area");
  if(ga.style.display==="none")return;
  const active=gameState.map((s,i)=>({s,i})).filter(({s})=>!s.done);
  if(!active.length)return;
  const t=active[0].i;
  if(e.key==="Backspace")handleKey(t,"⌫");
  else if(e.key==="Enter")handleKey(t,"ENTER");
  else if(/^[a-zA-Z]$/.test(e.key))handleKey(t,e.key.toUpperCase());
});
</script>
